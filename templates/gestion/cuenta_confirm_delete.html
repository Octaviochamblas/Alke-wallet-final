{% extends "base.html" %}

{% block content %}
<h1>Eliminar cuenta</h1>
<p>¿Seguro que deseas eliminar la cuenta {{ object.numero_cuenta }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
</form>

<a href="{% url 'cuenta_list' %}">Cancelar</a>
{% endblock %}
