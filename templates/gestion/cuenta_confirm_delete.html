{% extends "base.html" %}

{% block content %}
<section class="page-header">
    <h1>Eliminar cuenta</h1>
    <p>Esta acción eliminará la cuenta seleccionada del sistema.</p>
</section>

<div class="form-card">
    <p>¿Seguro que deseas eliminar la cuenta <strong>{{ object.numero_cuenta }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    </form>

    <a href="{% url 'cuenta_list' %}" class="back-link">Cancelar</a>
</div>
{% endblock %}
