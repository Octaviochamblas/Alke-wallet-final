{% extends "base.html" %}

{% block content %}
<h1>Listado de cuentas</h1>
<a href="{% url 'cuenta_create' %}">Crear cuenta</a>

<ul>
    {% for cuenta in cuentas %}
        <li>
            {{ cuenta.numero_cuenta }} - {{ cuenta.cliente }} - ${{ cuenta.saldo }}
        </li>
    {% empty %}
        <li>No hay cuentas registradas.</li>
    {% endfor %}
</ul>
{% endblock %}
