{% extends "base.html" %}

{% block content %}
<section class="page-header">
    <h1>Formulario de cuenta</h1>
    <p>
        Completa los datos para crear o editar una cuenta asociada a un cliente existente.
    </p>
    <p>
        Si el cliente no aparece, créalo primero desde el panel de administración.
    </p>
</section>

<div class="form-card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Guardar</button>
    </form>

    <a href="{% url 'cuenta_list' %}" class="back-link">Volver</a>
</div>
{% endblock %}
